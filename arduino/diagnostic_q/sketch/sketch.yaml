default_fqbn: arduino:zephyr:unoq
default_programmer: ""
default_port: ""
default_protocol: ""

profiles:
  unoq:
    fqbn: arduino:zephyr:unoq
    # Arduino_RouterBridge is NOT in the Library Manager index nor bundled
    # with the arduino:zephyr platform on this App Lab image. Fetch it from
    # GitHub directly. App Lab/arduino-cli supports the git_url form here.
    libraries:
      - Arduino_RouterBridge:
          git_url: https://github.com/arduino-libraries/Arduino_RouterBridge.git

default_profile: unoq
